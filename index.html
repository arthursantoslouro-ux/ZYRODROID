<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marizap Official</title>
    <style>
        /* Estilos Globais */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: #fff;
            overflow: hidden;
        }

        /* Tela de Introdução */
        #intro-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 1.2s ease, visibility 1.2s;
        }

        #intro-screen img { width: 220px; margin-bottom: 25px; }

        .spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        .fade-out { opacity: 0; visibility: hidden; }

        /* Header */
        header {
            display: flex;
            align-items: center;
            padding: 15px 25px;
            background: #111;
            border-bottom: 1px solid #222;
        }

        .menu-icon {
            font-size: 28px;
            cursor: pointer;
            margin-right: 25px;
            color: #888;
        }

        .logo-top { 
            width: 60px;
            height: auto; 
        }

        /* Menu Lateral Estilo Imagem */
        #sidebar {
            position: fixed;
            top: 0; left: -280px;
            width: 280px; height: 100%;
            background-color: #1e1e1e;
            z-index: 9999;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            padding-top: 20px;
        }

        #sidebar.active { left: 0; }

        .sidebar-header {
            padding: 20px 25px;
            font-size: 14px;
            color: #888;
            font-weight: bold;
            text-transform: uppercase;
        }

        .sidebar-item {
            padding: 15px 25px;
            display: flex;
            align-items: center;
            color: #e0e0e0;
            text-decoration: none;
            font-size: 16px;
            margin-right: 10px;
            transition: 0.2s;
        }

        .sidebar-item.active-item {
            background: rgba(43, 84, 152, 0.4);
            color: #8ab4f8;
            border-radius: 0 25px 25px 0;
        }

        .sidebar-subtext {
            font-size: 12px;
            color: #666;
            padding-left: 25px;
            margin-top: -10px;
            margin-bottom: 10px;
        }

        /* Overlay */
        #overlay {
            position: fixed;
            display: none;
            width: 100%; height: 100%;
            top: 0; left: 0;
            background-color: rgba(0,0,0,0.7);
            z-index: 9998;
        }

        /* Conteúdo Principal */
        #main-content {
            opacity: 0;
            transition: opacity 1.5s ease-in;
            padding: 60px 20px;
            text-align: center;
        }

        .content-visible { opacity: 1 !important; }

        /* Botão de Download com Ondas */
        .btn-wave {
            position: relative;
            padding: 22px 50px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            overflow: hidden;
            display: inline-block;
            text-decoration: none;
            transition: transform 0.3s;
        }

        .btn-wave:hover { transform: scale(1.05); }

        .btn-wave::before {
            content: '';
            position: absolute;
            left: 50%; top: 100%;
            width: 300%; height: 300%;
            background: rgba(0, 0, 0, 0.08);
            border-radius: 42%;
            transform: translate(-50%, -15%) rotate(0deg);
            animation: waves 7s infinite linear;
        }

        @keyframes waves { 100% { transform: translate(-50%, -15%) rotate(360deg); } }
    </style>
</head>
<body>

    <div id="intro-screen">
        <img src="https://raw.githubusercontent.com/arthursantoslouro-ux/Marizap-app-download/refs/heads/main/Screenshot_20260402-143457-removebg-preview.png" alt="Logo">
        <div class="spinner"></div>
    </div>

    <div id="overlay" onclick="toggleMenu()"></div>
    <div id="sidebar">
        <div class="sidebar-header">Conversas</div>
        <a href="#" class="sidebar-item active-item">Início</a>
        
        <div class="sidebar-header" style="margin-top: 20px;">Sistema</div>
        <a href="#" class="sidebar-item" style="color: #888;">Configurações</a>
        <div class="sidebar-subtext">(Mais configurações em breve)</div>
    </div>

    <header>
        <div class="menu-icon" onclick="toggleMenu()">☰</div>
        <img src="https://raw.githubusercontent.com/arthursantoslouro-ux/Marizap-app-download/refs/heads/main/Screenshot_20260402-143457-removebg-preview.png" class="logo-top" alt="Logo">
    </header>

    <main id="main-content">
        <div style="margin-bottom: 60px;">
            <a href="https://github.com/arthursantoslouro-ux/Marizap-app-download/blob/main/marizap.apk" class="btn-wave">
                <span>BAIXAR MARIZAP APP</span>
            </a>
        </div>
        
        <div style="color: #444; font-size: 14px;">Conteúdo do início em breve...</div>
    </main>

    <script>
        function toggleMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            sidebar.classList.toggle('active');
            overlay.style.display = sidebar.classList.contains('active') ? 'block' : 'none';
        }

        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('intro-screen').classList.add('fade-out');
                document.getElementById('main-content').classList.add('content-visible');
                document.body.style.overflow = 'auto';
            }, 3000);
        });
    </script>
</body>
          </html>
